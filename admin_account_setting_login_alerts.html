<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Alerts</title>
  <link rel="stylesheet" href="admin_account_setting.css">
</head>
<body class="login-alerts">
  <div class="card">
    <!-- Back arrow -->
    <button 
      aria-label="Go back"
      class="back-btn"
      onclick="history.back()"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>

    <h1 class="title">Login Alerts</h1>
    <p class="subtitle">
      Set how do you want to get notified about unrecognized logins.
    </p>

    <form>
      <fieldset class="options">
        <label class="option">
          <span class="label">In App notifications</span>
          <input type="checkbox" name="inApp" checked class="checkbox" />
        </label>

        <label class="option">
          <div class="option-info">
            <span class="label">Email</span>
            <span class="subtext">ursac.registrar@gmail.com</span>
          </div>
          <input type="checkbox" name="email" checked class="checkbox" />
        </label>
      </fieldset>
    </form>
  </div>
</body>
</html>
