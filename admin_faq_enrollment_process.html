<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REIGI - Admin - FAQ Enrollment Process</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
  <link href="style.css" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    #loading-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; opacity:0; pointer-events:none; transition: opacity 0.3s ease;
    }
    #loading-overlay.show { opacity:1; pointer-events: all; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar sticky-top admin-announcement-navbar">
    <div class="container-fluid justify-content-center">
      <span class="navbar-brand mb-0 h4 admin-announcement-text">FAQ's Enrollment Process</span>
    </div>
  </nav>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <main class="container-fluid my-4">
    <!-- Card Section -->
    <div class="card shadow-sm admin-announcement-card fade-in">
      <div class="card-body">
        <!-- Table -->
        <div class="table-wrapper">
          <table class="table table-hover align-middle announcement-table">
            <thead class="table-title">
              <tr>
                <th>ID</th>
                <th>Question Title</th>
                <th>FAQ Post Title</th>
                <th>Question Details</th>
                <th>Image</th>
                <th>Date & Time</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- rows dynamically injected -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Button -->
    <div class="text-center mt-3">
      <button class="btn add-announcement-btn">
        <i class="ph-bold ph-plus"></i>
        <span class="btn-text">Add new Question</span>
      </button>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const tbody = document.querySelector(".announcement-table tbody");
      const overlay = document.getElementById("loading-overlay");

      function showLoading() { overlay.classList.add("show"); }
      function hideLoading() { overlay.classList.remove("show"); }

      function renderTable() {
        tbody.innerHTML = "";
        let announcements = JSON.parse(localStorage.getItem("announcements")) || [];

        announcements.forEach((item, index) => {
          const dateObj = new Date(item.dateTime);
          const formattedDateTime = dateObj.toLocaleString("en-US", { year:"2-digit", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", hour12:true });

          const row = document.createElement("tr");
          row.classList.add("fade-in");
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${item.title}</td>
            <td>${item.details}</td>
            <td>${item.questionDetails || ""}</td>
            <td><img src="${item.image}" alt="announcement image" style="width:60px; height:auto; border-radius:4px;"></td>
            <td>${formattedDateTime}</td>
            <td>
              <a href="admin_announcement_edit.html?index=${index}" class="text-primary me-2 edit-link">Edit</a>
              <a href="#" class="text-danger trash-icon" data-index="${index}">
                <i class="ph ph-trash"></i>
              </a>
            </td>
          `;
          tbody.appendChild(row);
        });

        // Attach delete events
        document.querySelectorAll(".trash-icon").forEach(btn => {
          btn.addEventListener("click", function(e) {
            e.preventDefault();
            const index = this.dataset.index;
            if(confirm("Are you sure you want to delete this announcement?")) {
              let announcements = JSON.parse(localStorage.getItem("announcements")) || [];
              announcements.splice(index, 1);
              localStorage.setItem("announcements", JSON.stringify(announcements));
              renderTable();
            }
          });
        });

        // Render Phosphor icons
        if(window.PhosphorIcons) window.PhosphorIcons.replace();
      }

      showLoading();
      setTimeout(() => { renderTable(); hideLoading(); }, 300);

      // Auto-update when localStorage changes
      window.addEventListener("storage", e => { if(e.key === "announcements") renderTable(); });
      document.addEventListener("visibilitychange", () => { if(!document.hidden) renderTable(); });
    });
  </script>
</body>
</html>
