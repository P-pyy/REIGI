<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REIGI - faq - Document Request</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
  <link href="faq_enrollmemt_process.css" rel="stylesheet">
</head>
<body>

<div class="faq-main-title parallax">
  <div class="faq-in-container">
      <!-- Breadcrumb -->

      <div class="admin-breadcrumb-container">
          <a href="faq_user_menu.html" class="admin-breadcrumb mb-2 text-muted">Frequently Asked Questions</a>
          &gt;
          <a href="faq_enrollmemt_process.html" class="admin-breadcrumb mb-2 text-muted">Document Request</a>
      </div>
      <!-- <p class="admin-breadcrumb mb-2 text-muted">
        Frequently Asked Questions &gt; Enrollment Process
      </p> -->

    <!-- Main Title -->
    <h1 class="faq-menu-title">
      Document <br> Request
    </h1>

    <!-- Search bar -->
      <div class="search-container">
          <input class="search-bar" type="text" placeholder="Search..." >
      </div>
  </div>
  
</div>

<!-- FAQ Section -->
<div class="container my-5 d-flex flex-column align-items-center">
  <ol class="faq-list" style="padding-left: 1.5em;">
  <h5 class="mb-5 faq-title text-start" style="margin-left: -1em;">
    FREQUENTLY ASKED QUESTIONS:
  </h5>
  <!-- FAQs will be loaded here -->
</ol>
</div>



  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="script.js"></script>

  <script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const SUPABASE_URL = "https://oeeqegpgmobbuhaadrhr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lZXFlZ3BnbW9iYnVoYWFkcmhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY0ODQwNzEsImV4cCI6MjA3MjA2MDA3MX0.M-pplPUdj21v2Fb5aLmmbE94gDGCfslksAI8fJca2cE"; 
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadFAQs() {
    // Fetch only FAQs for Enrollment
    const { data, error } = await supabase
      .from("faqs")
      .select("*")
      .eq("category", "document-request");

    if (error) {
      console.error("Error fetching FAQs:", error);
      return;
    }

    const list = document.querySelector(".faq-list");
    list.innerHTML = `<h5 class="mb-5 faq-title text-start" style="margin-left: -1em;">FREQUENTLY ASKED QUESTIONS:</h5>`;

    data.forEach(faq => {
    const li = document.createElement("li");
    li.innerHTML = `
      <a href="faq_card.html?id=${faq.id}">${faq.post_title}</a>
      <i class="ph ph-arrow-up-right" style="color: #0055A5;"></i>
    `;
    list.appendChild(li);
  });
  }

  loadFAQs();
</script>
</body>
</html>
