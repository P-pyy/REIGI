<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>University of Rizal System - Admin Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-container" role="main" aria-label="Admin Login">
    <div class="logo-container">
      <img src="img/URS LOGO.png" alt="URS logo" onerror="this.style.display='none'" />
      <div class="logo-text">
        <span>University of</span>
        <span><strong>Rizal System</strong></span>
        <span class="campus">Antipolo campus</span>
      </div>
    </div>
    <h1>Welcome Back!</h1>
    <form id="loginForm" action="#" method="POST">
      <input id="email" name="email" type="email" placeholder="Email" required />
      <input id="password" name="password" type="password" placeholder="Password" required />

      <div class="extras">
        <label><input type="checkbox" id="showPassword" /> Show Password</label>
        <span class="forgot-password" role="link" tabindex="0" onclick="alert('Redirecting to password recovery page...')">Forgot Password?</span>
      </div>

      <button type="submit">Sign In</button>
    </form>
  </main>

  <script>
    document.getElementById('showPassword').addEventListener('change', function () {
      const pwd = document.getElementById('password');
      pwd.type = this.checked ? 'text' : 'password';
    });

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      alert("Form submitted. Replace with your own logic.");
    });
  </script>
</body>
</html>
