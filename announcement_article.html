<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REIGI - Announcements Article</title>
  <link rel="stylesheet" href="announcement_article.css">
</head>
<body>
  <main>
    <div class="card-container">
      <div class="card-wrapper">
        
        <a href="announcement.html">
           <i class="ph ph-arrow-left arrow-left-icon"></i>
        </a>


        <!-- JS will inject the main article card (or skeleton/fallback) here -->
        <div class="article-placeholder"></div>

      </div>
    </div>

    <div class="container-fluid">
      <!-- White card wrapper (form-like container) -->
      <div class="announcement-wrapper p-4 shadow-sm">
        <h5 class="text-center mb-4 other-announcement-title">Other Announcements</h5>
        <!-- Horizontal scroll cards -->
        <div class="other-announcements-scroll">
          <!-- JS will inject other announcements or skeletons here -->
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="script.js"></script>
  <script type="module" src="announcement_article.js"></script>

</body>
</html>
