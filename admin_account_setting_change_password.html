<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change Password Form</title>
  <link rel="stylesheet" href="admin_account_setting.css">
</head>
<body class="change-password">
  <main>
    <section class="form-container" aria-labelledby="change-password-title">
      <h2 id="change-password-title">Change Password</h2>
      <form id="changePasswordForm" autocomplete="off" aria-describedby="passwordHelpText">
        <input
          type="password"
          name="currentPassword"
          id="currentPassword"
          placeholder="Current Password"
          required
          aria-required="true"
          autocomplete="current-password"
        />
        <input
          type="password"
          name="newPassword"
          id="newPassword"
          placeholder="New Password"
          required
          aria-required="true"
          autocomplete="new-password"
          minlength="8"
        />
        <input
          type="password"
          name="reenterNewPassword"
          id="reenterNewPassword"
          placeholder="Re-enter New Password"
          required
          aria-required="true"
          autocomplete="new-password"
          minlength="8"
        />
        <button type="submit" aria-label="Submit change password form">Submit</button>
      </form>
    </section>
  </main>
  <script>
    const form = document.getElementById('changePasswordForm');
    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const currentPass = form.currentPassword.value.trim();
      const newPass = form.newPassword.value.trim();
      const reenterPass = form.reenterNewPassword.value.trim();

      if(newPass !== reenterPass) {
        alert("New passwords do not match. Please re-enter.");
        form.reenterNewPassword.focus();
        return;
      }

      if(newPass.length < 8) {
        alert("New password must be at least 8 characters long.");
        form.newPassword.focus();
        return;
      }

      alert("Password change submitted successfully!");
      form.reset();
    });
  </script>
</body>
</html>
