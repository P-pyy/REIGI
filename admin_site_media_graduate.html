<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Media Editor</title>
  <link rel="stylesheet" href="admin_site_media.css">
</head>
<body class="site-media-graduate-page">
  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-left">
      <a href="admin_site_media.html" class="back-arrow">⭠</a>
      <h1>Site Media Editor</h1>
    </div>
  </header>

  <!-- Main Content -->
  <div class="container">
    <!-- Left Card -->
    <div class="card">
      <h2>Academic Calendar</h2>
      <p class="subtitle">Graduate School</p>
      <p class="preview-text">PREVIEW</p>
      <div class="preview-box">
        <img src="img/Calendar.png" alt="Preview">
      </div>
    </div>

    <!-- Right Card -->
    <div class="card upload-card">
      <div class="upload-box">
        <label>
          <div class="choose-btn">Choose Image</div>
          <input type="file" hidden accept="image/png, image/jpeg, image/webp">
        </label>
        <p class="drag-text">Drag & Drop the image here</p>
        <p class="file-types">PNG / JPG / Webp</p>
      </div>
      <button class="submit-btn">Submit Change</button>
    </div>
  </div>
</body>
</html>
