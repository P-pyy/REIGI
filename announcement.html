<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REIGI - Announcements</title>
  <link rel="stylesheet" href="announcement.css" />
</head>
<body>
  <main>
    <header class="announcement-header" style="margin-top: 80px;">
      <div class="container">
        <h1>Announcements</h1>
      </div>
    </header>

    <div class="announcement-page container">
      <aside class="sidebar">
        <div class="filter-search">
          <label for="search">Filter Search</label>
          <input type="text" id="search" name="search" placeholder="Search" />
        </div>
        <div class="filter-month">
          <label for="month">Month</label>
          <select id="month" name="month">
            <option value="default">Default</option>
            <option value="january">January</option>
            <option value="february">February</option>
            <option value="march">March</option>
            <option value="april">April</option>
            <option value="may">May</option>
            <option value="june">June</option>
            <option value="july">July</option>
            <option value="august">August</option>
            <option value="september">September</option>
            <option value="october">October</option>
            <option value="november">November</option>
            <option value="december">December</option>
          </select>
        </div>
      </aside>

      <div class="announcement-content">
        <div class="announcement-grid">
          <!-- JS will inject announcements or fallback placeholder here -->
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
  <script type="module" src="script.js"></script>
  <script type="module" src="announcement.js"></script>
</body>
</html>
