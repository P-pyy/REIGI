<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin FAQs Menu </title>

  <!-- Bootstrap & CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="adminstyle.css" />
  <link rel="icon" type="image/png" href="img/URS LOGO.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/phosphor-icons"></script>
   <link rel="stylesheet" href="faqs.css" />

</head>
<body>


<div class="container-fluid d-flex p-0 min-vh-100">

  <!-- Sidebar Include -->
  <div id="sidebar-container"></div>

<!-- HEADER -->
<header class="main-header d-flex justify-content-between align-items-center px-4">
  <h1 class="mb-0">Frequently Asked Questions</h1>
</header>

<!-- Main Content -->
<main class="main-content flex-grow-1">
  <div class="faq-wrapper">
    <div class="faq-grid">

      <!-- FAQ Card 1 -->
      <div class="faq-card">
        <div>
          <div class="faq-header">
            <div class="faq-title">Enrollment Process</div>
            <i class="ph-bold ph-checks phosphor-icon"></i>
          </div>
          <div class="faq-desc"></div>
        </div>
        <div class="card-footer">
          <button class="card-button">See List</button>
        </div>
      </div>

      <!-- FAQ Card 2 -->
      <div class="faq-card">
        <div>
          <div class="faq-header">
            <div class="faq-title">Document Request</div>
            <i class="ph-bold ph-files phosphor-icon"></i>
          </div>
          <div class="faq-desc"></div>
        </div>
        <div class="card-footer">
          <button class="card-button">See List</button>
        </div>
      </div>

      <!-- FAQ Card 3 -->
      <div class="faq-card">
        <div>
          <div class="faq-header">
            <div class="faq-title">Graduation & Clearance</div>
            <i class="ph-bold ph-list-checks phosphor-icon"></i>
          </div>
          <div class="faq-desc"></div>
        </div>
        <div class="card-footer">
          <button class="card-button">See List</button>
        </div>
      </div>

    </div>
  </div>
</main>
</div>

<!-- Load Sidebar Script -->
<script>
  fetch('sidebar.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('sidebar-container').innerHTML = data;

      const currentPage = window.location.pathname.split("/").pop();
      document.querySelectorAll(".menu li a").forEach(link => {
        if (link.getAttribute("href") === currentPage) {
          link.classList.add("active");
        }
      });

      const toggleBtn = document.querySelector('.toggle-btn');
      const sidebar = document.querySelector('.sidebar');
      const mainContent = document.querySelector('.main-content');
      const mainHeader = document.querySelector('.main-header');
      if (toggleBtn && sidebar && mainContent && mainHeader) {
        toggleBtn.addEventListener('click', () => {
          sidebar.classList.toggle('small-sidebar');
          const isSmall = sidebar.classList.contains('small-sidebar');
          mainContent.style.marginLeft = isSmall ? '80px' : '250px';
          mainHeader.style.width = isSmall ? 'calc(100% - 80px)' : 'calc(100% - 250px)';
          mainHeader.style.marginLeft = isSmall ? '80px' : '250px';
          window.dispatchEvent(new Event('resize')); 
        });
      }
    })
    .catch(error => console.error('Error loading sidebar:', error));
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
