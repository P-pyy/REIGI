<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announcements</title>

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/phosphor-icons"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">

  <!-- Custom CSS -->
  <link href="announcements.css" rel="stylesheet">
</head>


<body>
  <div class="container-fluid d-flex p-0 min-vh-100">

    <!-- Sidebar Include -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <main class="main-content flex-grow-1">

      <!-- Navbar
      <nav class="navbar sticky-top admin-announcement-navbar">
        <div class="container-fluid justify-content-center">
          <span class="navbar-brand mb-0 h4 admin-announcement-text">Announcements</span>
        </div>
      </nav> -->

      <!-- Loading Overlay -->
      <div id="loading-overlay">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <div class="container-fluid my-4">

        <!-- Card Section -->
        <div class="card shadow-sm admin-announcement-card fade-in">
          <div class="card-body">

            <!-- Table -->
            <div class="table-wrapper">
              <table class="table table-hover align-middle announcement-table">
                <thead class="table-title">
                  <tr>
                    <th>Announcement Title</th>
                    <th>Announcement Details</th>
                    <th>Image</th>
                    <th>Scheduled Date</th>
                    <th>Time</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- rows dynamically injected -->
                </tbody>
              </table>
            </div>
            <!-- End of table -->

          </div>
        </div>

        <!-- Button
        <div class="text-center mt-3">
          <a href="announcement_edit.html" class="btn add-announcement-btn">
            <i class="ph-bold ph-plus"></i>
            <span class="btn-text">Add new Announcement</span>
          </a>
        </div> -->

        <!-- Add Button -->
        <div class="text-center mt-3">
          <button id="add-announcement-btn" class="btn add-announcement-btn">
            <i class="ph-bold ph-plus"></i>
            <span class="btn-text">Add new Announcement</span>
          </button>
        </div>

<div id="edit-form-container" style="display:none;"></div>


      </div>
    </main>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>

  <!-- Custom Scripts -->
  <script type="module" src="announcements.js"></script>

  
  <!-- Script to load sidebar -->
  <script>
  fetch('sidebar.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('sidebar-container').innerHTML = data;

      const currentPage = window.location.pathname.split("/").pop();
      document.querySelectorAll(".menu li a").forEach(link => {
        if (link.getAttribute("href") === currentPage) {
          link.classList.add("active");
        }
      });

      // Add event listeners after sidebar content is loaded
      const toggleBtn = document.querySelector('.toggle-btn');
      const sidebar = document.querySelector('.sidebar');
      const mainContent = document.querySelector('.main-content');
      const mainHeader = document.querySelector('.main-header');
      if (toggleBtn && sidebar && mainContent && mainHeader) {
        toggleBtn.addEventListener('click', () => {
          sidebar.classList.toggle('small-sidebar');
          // Update main content and header
          const isSmall = sidebar.classList.contains('small-sidebar');
          mainContent.style.marginLeft = isSmall ? '80px' : '250px';
          mainHeader.style.width = isSmall ? 'calc(100% - 80px)' : 'calc(100% - 250px)';
          mainHeader.style.marginLeft = isSmall ? '80px' : '250px';
          window.dispatchEvent(new Event('resize')); 
        });
      }
    })
    .catch(error => console.error('Error loading sidebar:', error));
  </script>
</body>
</html>
