<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Site Media</title>

  <!-- Bootstrap & CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="admin.css" />
  <link rel="icon" type="image/png" href="img/URS LOGO.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/phosphor-icons"></script>
</head>

<body class="site-media-page">
  <div class="container-fluid d-flex p-0 min-vh-100">
    
    <!-- SIDEBAR LOAD -->
    <div id="sidebar-container"></div>

    <!-- HEADER -->
    <header class="main-header d-flex justify-content-between align-items-center">
      <h1 class="mb-0">Site Media</h1>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content flex-grow-1">
      <div class="container">
        <div id="media-container">
          <div class="media-grid">
            <!-- Card 1 -->
            <div class="card media left-card media-card">
              <h2>Homepage FAQ Video</h2>
              <div class="image-box">
                <img src="img/CARD-BG.png" alt="FAQ Video Thumbnail">
              </div>
              <p class="file-name">VID_01234_5678abcdefgh</p>
              <button class="btn upload-btn" data-target="site_media_video.html">+ Upload Video</button>
            </div>

            <!-- Card 2 -->
            <div class="card media right-card media-card">
              <h2>Academic Calendar</h2>
              <div class="image-box">
                <img src="img/CARD-BG.png" alt="Academic Calendar">
              </div>
              <p class="file-name">CARD-BG.png</p>
              <button class="btn upload-btn" data-target="site_media_calendar.html">+ Upload Image</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- BOOTSTRAP JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="admin.js"></script>
  <script type="module" src="sitemedia.js"></script>
</body>
</html>
