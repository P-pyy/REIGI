<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login History</title>
  <link rel="stylesheet" href="admin_account_setting.css">
</head>
<body class="login-history">
  <div class="container">
    <!-- Header -->
    

    <main class="main">
  <!-- Top controls (Back + Close) -->
  <div class="top-controls">
    <button id="backBtn" aria-label="Go back" class="icon-btn">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" 
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" 
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>

    <h1 class="header-title"></h1>

    <button id="closeBtn" aria-label="Close login history" class="icon-btn">
      <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" 
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" 
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <!-- Page title -->
  <h2 class="page-title">Login History</h2>
      
        <!-- Current session -->
        <section class="current-session">
          <p class="label">Your current login session:</p>
          <button class="device-card">
            <h2 class="device-title">Windows PC</h2>
            <p class="device-location">Antipolo City, Philippines</p>
            <p class="this-device">This Device</p>
            <span class="arrow">
              <svg xmlns="http://www.w3.org/2000/svg" class="arrow-icon" fill="none" 
                stroke="currentColor" stroke-width="2" stroke-linecap="round" 
                stroke-linejoin="round" viewBox="0 0 24 24">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </span>
          </button>
        </section>

      <!-- Saved devices -->
      <section>
        <h3 class="saved-title">Saved Devices</h3>
        <div class="saved-devices-scroll">

          <button class="device-card">
            <h4 class="device-card-title">Windows 10</h4>
            <p class="device-location">Antipolo City, Philippines</p>
            <p class="device-time">Today at 1:39 pm</p>
            <span class="arrow">
              <svg xmlns="http://www.w3.org/2000/svg" class="arrow-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </span>
          </button>

          <button class="device-card">
            <h4 class="device-card-title">Windows 11</h4>
            <p class="device-location">Antipolo City, Philippines</p>
            <p class="device-time">Yesterday at 9:07 am</p>
            <span class="arrow">
              <svg xmlns="http://www.w3.org/2000/svg" class="arrow-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </span>
          </button>

          <button class="device-card">
            <h4 class="device-card-title">Infinix Hot 12</h4>
            <p class="device-location">Antipolo City, Philippines</p>
            <p class="device-time">August 23 at 6:11 pm</p>
            <span class="arrow">
              <svg xmlns="http://www.w3.org/2000/svg" class="arrow-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </span>
          </button>

        </div>
      </section>
    </main>
  </div>

  <script>
    document.getElementById('backBtn').addEventListener('click', () => {
      history.back();
    });

    document.getElementById('closeBtn').addEventListener('click', () => {
      alert('Close login history panel');
    });
  </script>
</body>
</html>
