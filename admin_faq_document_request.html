<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REIGI - Admin - FAQ Document Request</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
  <link href="admin_faq_graduation_clearance.css" rel="stylesheet">

  <style>
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    #loading-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; opacity:0; pointer-events:none; transition: opacity 0.3s ease;
    }
    #loading-overlay.show { opacity:1; pointer-events: all; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar sticky-top admin-announcement-navbar">
    <div class="container-fluid justify-content-center">
      <span class="navbar-brand mb-0 h4 admin-announcement-text">FAQ's Enrollment Process</span>
    </div>
  </nav>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <main class="container-fluid my-4">
    <!-- Card Section -->
    <div class="card shadow-sm admin-announcement-card fade-in">
      <div class="card-body">
        <!-- Table -->
        <div class="table-wrapper">
          <table class="table table-hover align-middle announcement-table">
            <thead class="table-title">
              <tr>
                <th>ID</th>
                <th>Question Title</th>
                <th>FAQ Post Title</th>
                <th>Question Details</th>
                <th>Image</th>
                <th>Date & Time</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- rows dynamically injected -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Button -->
    <div class="text-center mt-3">
      <button class="btn add-announcement-btn">
        <i class="ph-bold ph-plus"></i>
        <span class="btn-text">Add new Question</span>
      </button>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="admin_faq_document_request.js"></script>

</body>
</html>
