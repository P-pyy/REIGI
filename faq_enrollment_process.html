<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>REIGI - faq - Enrollment Process</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
  <link href="faq_enrollmemt_process.css" rel="stylesheet">
</head>
<body>

      <!-- Full-width Banner -->
<div class="faq-main-title parallax">
  <div class="faq-in-container">
      <!-- Breadcrumb -->

      <div class="admin-breadcrumb-container">
          <a href="faq_user_menu.html" class="admin-breadcrumb mb-1 text-muted">Frequently Asked Questions</a>
          &gt;
          <a href="faq_enrollment_process.html" class="admin-breadcrumb mb-1 text-muted">Enrollment Process</a>
      </div>
      <!-- <p class="admin-breadcrumb mb-2 text-muted">
        Frequently Asked Questions &gt; Enrollment Process
      </p> -->

    <!-- Main Title -->
    <h1 class="faq-menu-title">
      Enrollment <br> Process
    </h1>

    <!-- Search bar -->
    <div class="search-container">
      <input id="faq-search" class="search-bar" type="text" placeholder="Search...">
    </div>

    <!-- Search results -->
    <div id="search-results" class="mt-3"></div>
  </div>
  
</div>

<!-- FAQ Section -->
<div class="faq-wrapper ">
  <div class="faq-grid">
    <ol class="faq-list" style="padding-left: 1.5em;">
    <h5 class="mb-5 faq-title text-start" style="margin-left: -1em;">
      FREQUENTLY ASKED QUESTIONS:
    </h5>
  <!-- FAQs will be loaded here -->
</ol>

</div>
  
</div>






  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="script.js"></script>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://oeeqegpgmobbuhaadrhr.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lZXFlZ3BnbW9iYnVoYWFkcmhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY0ODQwNzEsImV4cCI6MjA3MjA2MDA3MX0.M-pplPUdj21v2Fb5aLmmbE94gDGCfslksAI8fJca2cE";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Load only ENROLLMENT by default
    async function loadFAQs() {
      const { data, error } = await supabase
        .from("faqs")
        .select("*")
        .eq("category", "enrollment");

      if (error) {
        console.error("Error fetching FAQs:", error);
        return;
      }

      const list = document.querySelector(".faq-list");
      list.innerHTML = `<h5 class="mb-5 faq-title text-start" style="margin-left: -1em;">FREQUENTLY ASKED QUESTIONS:</h5>`;

      data.forEach(faq => {
        const li = document.createElement("li");
        li.innerHTML = `
          <a href="faq_card.html?id=${faq.id}">${faq.post_title}</a>
          <i class="ph ph-arrow-up-right" style="color: #0055A5;"></i>
        `;
        list.appendChild(li);
      });
    }
    loadFAQs();

    // search across all categories
    const searchInput = document.getElementById("faq-search");
    const resultsDiv = document.getElementById("search-results");

     async function searchFAQs(query) {
  if (!query.trim()) {
    resultsDiv.innerHTML = "";
    resultsDiv.style.display = "none"; // hide results when empty
    return;
  } else {
    resultsDiv.style.display = "block"; // show results when typing
  }

  const { data, error } = await supabase
    .from("faqs")
    .select("id, post_title, category")
    .ilike("post_title", `%${query}%`);

  if (error) {
    console.error("Error searching FAQs:", error);
    return;
  }

  if (!data || data.length === 0) {
    resultsDiv.innerHTML = `<p class="text-muted">No results found.</p>`;
    return;
  }

  resultsDiv.innerHTML = data.map(faq => `
    <div class="search-result mb-2">
      <a href="faq_card.html?id=${faq.id}">
        [${faq.category.replace("-", " ").toUpperCase()}] ${faq.post_title}
      </a>
    </div>
  `).join("");
  }

    // Trigger search on typing
    searchInput.addEventListener("input", e => {
      searchFAQs(e.target.value);
    });
  </script>

</body>
</html>
