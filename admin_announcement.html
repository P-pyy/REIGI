<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REIGI - Admin - Announcement</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
  <link href="style.css" rel="stylesheet">

  <style>
    /* Fade-in animation for smoother updates */
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Overlay smooth transition */
    #loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #loading-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar sticky-top admin-announcement-navbar">
    <div class="container-fluid justify-content-center">
      <span class="navbar-brand mb-0 h4 admin-announcement-text">Announcements</span>
    </div>
  </nav>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <main class="container-fluid my-4">

    <!-- Card Section -->
    <div class="card shadow-sm admin-announcement-card fade-in">
      <div class="card-body">

        <!-- Table -->
        <div class="table-wrapper">
          <table class="table table-hover align-middle announcement-table">
            <thead class="table-title">
              <tr>
                <th>Announcement Title</th>
                <th>Announcement Details</th>
                <th>Image</th>
                <th>Scheduled Date</th>
                <th>Time</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- rows dynamically injected -->
            </tbody>
          </table>
        </div>
        <!-- End of table -->

      </div>
    </div>

    <!-- Button -->
    <div class="text-center mt-3">
      <button class="btn add-announcement-btn">
        <i class="ph-bold ph-plus"></i>
        <span class="btn-text">Add new Announcement</span>
      </button>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <script>
    window.addEventListener("DOMContentLoaded", function () {
      const tbody = document.querySelector(".announcement-table tbody");
      const overlay = document.getElementById("loading-overlay");

      function showLoading() {
        overlay.classList.add("show");
      }
      function hideLoading() {
        overlay.classList.remove("show");
      }

      function renderTable() {
        tbody.innerHTML = "";
        let announcements = JSON.parse(localStorage.getItem("announcements")) || [];

        announcements.forEach((item, index) => {
          const dateObj = new Date(item.dateTime);
          const formattedDate = dateObj.toLocaleDateString("en-US", { year: "2-digit", month: "2-digit", day: "2-digit" });
          const formattedTime = dateObj.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: true });

          const row = document.createElement("tr");
          row.classList.add("fade-in");
          row.innerHTML = `
            <td>${item.title}</td>
            <td>${item.details}</td>
            <td><img src="${item.image}" alt="announcement image" style="width:60px; height:auto; border-radius:4px;"></td>
            <td>${formattedDate}</td>
            <td>${formattedTime}</td>
            <td>
              <a href="admin_announcement_edit.html?index=${index}" class="text-primary me-2 edit-link">Edit</a>
              <a href="#" class="text-danger trash-icon" data-index="${index}">
                <i class="ph ph-trash"></i>
              </a>
            </td>
          `;
          tbody.appendChild(row);
        });

        // Attach delete event
        document.querySelectorAll(".trash-icon").forEach(btn => {
          btn.addEventListener("click", function (e) {
            e.preventDefault();
            const index = this.getAttribute("data-index");

            if (confirm("Are you sure you want to delete this announcement?")) {
              let announcements = JSON.parse(localStorage.getItem("announcements")) || [];
              announcements.splice(index, 1);
              localStorage.setItem("announcements", JSON.stringify(announcements));

              // Dispatch storage event to update announcement.html in other tab
              window.dispatchEvent(new StorageEvent("storage", { key: "announcements" }));

              renderTable();
            }
          });
        });

        // Re-render Phosphor icons after dynamic content
        if (window.PhosphorIcons) window.PhosphorIcons.replace();
      }

      // Show loading, simulate delay for smoother UX
      showLoading();
      setTimeout(() => {
        renderTable();
        hideLoading();
      }, 600);

      // 🔥 Auto-update other tabs (announcement.html) when this tab changes localStorage
      window.addEventListener("storage", (e) => {
        if (e.key === "announcements") {
          renderTable();
        }
      });

      // 🔥 Auto-refresh when user returns to this tab
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          renderTable();
        }
      });
    });
  </script>

</body>
</html>
