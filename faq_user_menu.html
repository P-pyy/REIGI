<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REIGI - FAQ's</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="faq_user_menu.css" />
</head>
<body>   

    
<main>
   
<!-- FAQ Header -->
    <div class="faq-main-title parallax" >
      <div class="faq-in-container">
        <h1 class="faq-menu-title">
          Frequently Asked <br> Questions
        </h1>
        <div class="search-container">
         <input id="faq-search" class="search-bar" type="text" placeholder="Search..." >
        </div>

        <!-- add this under search box for results -->
        <div id="search-results" class="mt-3"></div>

      </div>
    </div>

    <div class="faq-wrapper">
     <div class="faq-grid">
       <div class="faq-card">
         <div>
          <!-- FAQ Card 1 -->
           <div class="faq-header">
             <div class="faq-title">Enrollment <br>Process</div>
             <i class="ph-bold ph-checks phosphor-icon"></i>
           </div>
           <div class="faq-desc">Everything you need before <br> diving into the semester.</div>
         </div>
         <a href="faq_enrollment_process.html" class="faq-link">Read FAQs</a>
       </div>
        
        <!-- FAQ Card 2  -->
       <div class="faq-card">
         <div>
           <div class="faq-header">
             <div class="faq-title">Document Request</div>
             <i class="ph-bold ph-files phosphor-icon"></i>
           </div>
           <div class="faq-desc">Everything you need before <br> diving into the semester.</div>
       </div>
         <a href="faq_document_request.html" class="faq-link">Read FAQs</a>
        </div>

        <!-- FAQ Card 3  -->
        <div class="faq-card">
        <div>
           <div class="faq-header">
             <div class="faq-title">Graduation & Clearance</div>
           <i class="ph-bold ph-list-checks phosphor-icon"></i>
         </div>
         <div class="faq-desc">Everything you need before <br> diving into the semester.</div>
       </div>
       <a href="faq_graduation_clearance.html" class="faq-link">Read FAQs</a>
     </div>

   </div>
  </div>

</main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="script.js"></script>

    <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://oeeqegpgmobbuhaadrhr.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lZXFlZ3BnbW9iYnVoYWFkcmhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY0ODQwNzEsImV4cCI6MjA3MjA2MDA3MX0.M-pplPUdj21v2Fb5aLmmbE94gDGCfslksAI8fJca2cE";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const searchInput = document.getElementById("faq-search");
    const resultsDiv = document.getElementById("search-results");

    // Map categories to readable text
    function formatCategory(cat) {
      const map = {
        "enrollment-process": "Enrollment Process",
        "document-request": "Document Request",
        "graduation-clearance": "Graduation & Clearance",
      };
      return map[cat] || "FAQ";
    }

      async function searchFAQs(query) {
    if (!query.trim()) {
      // Clear only the search results when input is empty
      resultsDiv.innerHTML = "";
      resultsDiv.style.display = "none"; // hide results completely
      return;
    }

    resultsDiv.style.display = "block"; // show results when typing

    const { data, error } = await supabase
      .from("faqs")
      .select("id, category, post_title")
      .ilike("post_title", `%${query}%`);

    if (error) {
      console.error("Error searching FAQs:", error);
      return;
    }

    if (!data || data.length === 0) {
      resultsDiv.innerHTML = `<p class="text-muted">No results found.</p>`;
      return;
    }

    resultsDiv.innerHTML = data.map(faq => `
      <div class="search-result mb-2">
        <a href="faq_card.html?id=${faq.id}">
          Frequently Asked Questions > ${formatCategory(faq.category)} > ${faq.post_title}
        </a>
      </div>
    `).join("");
  }


    // Trigger search on typing
    searchInput.addEventListener("input", e => {
      searchFAQs(e.target.value);
    });
  </script>

</body>
</html>
